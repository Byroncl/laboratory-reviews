<div class="reaction-bar">
  @for (emoji of availableEmojis; track emoji) {
    <button
      type="button"
      class="reaction-btn"
      [class.reacted]="hasReacted(emoji)"
      (click)="toggleReaction(emoji)"
      [attr.aria-label]="emoji + ' ' + getCount(emoji)"
    >
      <span class="reaction-emoji">{{ emoji }}</span>
      @if (getCount(emoji) > 0) {
        <span class="reaction-count">{{ getCount(emoji) }}</span>
      }
    </button>
  }
</div>

@if (showAuthModal()) {
  <div class="auth-modal-backdrop" (click)="closeAuthModal()">
    <div class="auth-modal" (click)="$event.stopPropagation()">
      <h3>{{ 'posts.reaction.signInTitle' | t }}</h3>
      <p>{{ 'posts.reaction.signInBody' | t }}</p>
      <div class="auth-modal-actions">
        <button class="btn btn-primary" (click)="goToLogin()">{{ 'posts.reaction.signInBtn' | t }}</button>
        <button class="btn btn-outline" (click)="goToRegister()">{{ 'posts.reaction.registerBtn' | t }}</button>
        <button class="btn btn-ghost" (click)="closeAuthModal()">{{ 'posts.reaction.cancelBtn' | t }}</button>
      </div>
    </div>
  </div>
}
