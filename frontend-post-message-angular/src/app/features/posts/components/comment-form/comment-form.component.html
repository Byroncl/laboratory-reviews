<form [formGroup]="commentForm" (ngSubmit)="onSubmit()" class="comment-form">
  <div class="form-group">
    <label for="name">Name</label>
    <input
      id="name"
      type="text"
      formControlName="name"
      placeholder="Your name"
      [attr.disabled]="isLoading ? true : null"
    />
    @if (getFieldError('name')) {
      <span class="error">{{ getFieldError('name') }}</span>
    }
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      placeholder="your.email@example.com"
      [attr.disabled]="isLoading ? true : null"
    />
    @if (getFieldError('email')) {
      <span class="error">{{ getFieldError('email') }}</span>
    }
  </div>

  <div class="form-group">
    <label for="body">Comment</label>
    <textarea
      id="body"
      formControlName="body"
      [placeholder]="placeholder"
      rows="4"
      [attr.disabled]="isLoading ? true : null"
    ></textarea>
    @if (getFieldError('body')) {
      <span class="error">{{ getFieldError('body') }}</span>
    }
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary" [disabled]="isLoading">
      {{ isLoading ? 'Submitting...' : 'Submit' }}
    </button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading">
      Cancel
    </button>
  </div>
</form>
