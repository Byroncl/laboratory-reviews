<div class="form-container">
  <div class="form-header">
    <h1>{{ isEditMode() ? 'Edit Post' : 'Create New Post' }}</h1>
  </div>

  @if (error()) {
    <div class="form-error">
      <p>{{ error() }}</p>
    </div>
  }

  <form [formGroup]="postForm" (ngSubmit)="onSubmit()" class="post-form">
    <div class="form-group">
      <label for="title">Title</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Post title..."
        [attr.disabled]="isLoading() ? true : null"
      />
      @if (getFieldError('title')) {
        <span class="error">{{ getFieldError('title') }}</span>
      }
    </div>

    <div class="form-group">
      <label for="content">Content</label>
      <textarea
        id="content"
        formControlName="content"
        placeholder="Post content..."
        rows="10"
        [attr.disabled]="isLoading() ? true : null"
      ></textarea>
      @if (getFieldError('content')) {
        <span class="error">{{ getFieldError('content') }}</span>
      }
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select
        id="status"
        formControlName="status"
        [attr.disabled]="isLoading() ? true : null"
      >
        <option value="">No status (draft)</option>
        @for (option of statusOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="tags">Tags (comma-separated)</label>
      <input
        id="tags"
        type="text"
        formControlName="tags"
        placeholder="tag1, tag2, tag3..."
        [attr.disabled]="isLoading() ? true : null"
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="isLoading()">
        {{ isLoading() ? 'Saving...' : 'Save Post' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading()">
        Cancel
      </button>
    </div>
  </form>
</div>
